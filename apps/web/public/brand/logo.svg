<svg width="920" height="220" viewBox="0 0 920 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Certification Playground logo</title>
  <desc id="desc">A minimalist certification emblem beside the Claude Certification Playground wordmark.</desc>
  <rect width="920" height="220" rx="36" fill="#F2F0ED"/>

  <g transform="translate(40 36)">
    <!-- Charcoal background for the badge -->
    <rect width="148" height="148" rx="34" fill="#2A2927"/>
    
    <!-- Outer circle in cream -->
    <circle cx="74" cy="74" r="46" fill="none" stroke="#F2F0ED" stroke-width="10"/>
    
    <!-- Copper asterisk -->
    <g transform="translate(74 62) scale(0.35)">
      <path d="M 0 -55 L 0 55 M -48 28 L 48 -28 M -48 -28 L 48 28" stroke="#D48060" stroke-width="24" stroke-linecap="butt"/>
    </g>
    
    <!-- Cut out for checkmark (using charcoal to blend with background rect) -->
    <path d="M46 82 L68 104 L114 54" fill="none" stroke="#2A2927" stroke-width="26" stroke-linecap="square" stroke-linejoin="miter"/>
    
    <!-- Cream checkmark -->
    <path d="M46 82 L68 104 L114 54" fill="none" stroke="#F2F0ED" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter"/>
  </g>

  <!-- Typography matching Anthropic's aesthetic: serif or elegant sans. -->
  <text x="220" y="106" fill="#2A2927" font-family="ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif" font-size="52" font-weight="600" letter-spacing="-0.02em">Claude Certification</text>
  <text x="224" y="152" fill="#757169" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" letter-spacing="0">FastAPI + Next.js Playground</text>
</svg>
