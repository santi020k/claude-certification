<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claude Certification icon</title>
  <desc id="desc">A minimalist emblem with a copper asterisk and checkmark on a warm cream background.</desc>
  <rect width="512" height="512" rx="112" fill="#F2F0ED"/>
  
  <!-- The charcoal circle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#2A2927" stroke-width="28"/>
  
  <!-- Copper asterisk (6-pointed like the Anthropic star) -->
  <g transform="translate(256 215)">
    <path d="M 0 -55 L 0 55 M -48 28 L 48 -28 M -48 -28 L 48 28" stroke="#D48060" stroke-width="20" stroke-linecap="butt"/>
  </g>
  
  <!-- Cream outline to cut out the circle beneath the checkmark -->
  <path d="M170 280 L240 350 L380 200" fill="none" stroke="#F2F0ED" stroke-width="72" stroke-linecap="square" stroke-linejoin="miter"/>
  
  <!-- The charcoal checkmark -->
  <path d="M170 280 L240 350 L380 200" fill="none" stroke="#2A2927" stroke-width="28" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
